# Optional stack on the VM: Prometheus + Grafana + node-exporter + blue/green app slots
# Usage: APP_IMAGE=ghcr.io/org/repo:tag docker compose -f docker-compose.monitoring.yml up -d
services:
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - app-blue
      - app-green

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.8.2
    ports:
      - "9100:9100"

  app-blue:
    image: ${APP_IMAGE:-ghcr.io/example/app:latest}
    environment:
      - PORT=3000
      - APP_VERSION=${APP_VERSION:-1.0.0}
      # Optional: wire /ai-dashboard links (use public URLs reachable from your browser)
      - GITHUB_REPO_URL=${GITHUB_REPO_URL:-}
      - GRAFANA_EXTERNAL_URL=${GRAFANA_EXTERNAL_URL:-}
      - PROMETHEUS_EXTERNAL_URL=${PROMETHEUS_EXTERNAL_URL:-}
    ports:
      - "3000:3000"

  app-green:
    image: ${APP_IMAGE:-ghcr.io/example/app:latest}
    environment:
      - PORT=3001
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - GITHUB_REPO_URL=${GITHUB_REPO_URL:-}
      - GRAFANA_EXTERNAL_URL=${GRAFANA_EXTERNAL_URL:-}
      - PROMETHEUS_EXTERNAL_URL=${PROMETHEUS_EXTERNAL_URL:-}
    ports:
      - "3002:3001"
